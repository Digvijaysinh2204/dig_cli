# file: .github/workflows/publish.yml

name: 'Publish to Pub.dev & GitHub'

# Opt into Node.js 24 for JS-based actions (GitHub: Node 20 runner deprecation).
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# setup-dart@v1.7.2 supports Node 24 natively.
# softprops/action-gh-release may still warn (action.yml node20) until upstream updates.

jobs:
  analyze:
    name: 'Analyze'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1.7.2

      - name: 'Install dependencies'
        run: dart pub get

      - name: 'Analyze project source'
        run: dart analyze lib bin --fatal-infos --fatal-warnings

  build:
    name: 'Build Binaries'
    needs: analyze
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output: dg-linux
          - os: macos-latest
            output: dg-macos
          - os: windows-latest
            output: dg-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1.7.2

      - name: 'Cache Pub Session'
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: 'Install dependencies'
        run: dart pub get

      - name: 'Build Binary'
        run: dart compile exe bin/dig_cli.dart -o ${{ matrix.output }}

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os }}
          path: ${{ matrix.output }}

  # Order: all matrix builds → GitHub Release (binaries) → pub.dev last.
  release:
    name: 'Create GitHub Release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: 'Download compiled binaries'
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true

      - name: 'Create GitHub Release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dg-linux
            dg-windows.exe
            dg-macos
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish:
    name: 'Publish to Pub.dev'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1.7.2

      - name: 'Publish to pub.dev'
        run: dart pub publish --force
